<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Les Archives Miroirs - Démo (FR, Qingming seulement)</title>
  <style>
    html,body { width:100%; height:100%; margin:0; overflow:hidden; overscroll-behavior:none; font-family: Arial, Helvetica, sans-serif; background:#0b0b0e; color:#eee; }
    #game-container { width:100vw; height:100dvh; }
    #game-container canvas { display:block; touch-action:none; }
    .choice-btn { background: #222; border:1px solid #666; color:#fff; padding:6px 10px; margin:6px; cursor:pointer; border-radius:4px; }
    .choice-btn:hover { background:#333; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <script>
  /* Version simplifiée :
     - Un seul objet : « Le long de la rivière pendant la fête de Qingming »
     - Un puzzle de 15×1 pour restaurer le rouleau
     - Une scène de métadonnées erronées à corriger
     - Un choix moral final
  */

  const DIALOGUES = {
    intro: [
      "Année 2042 — Une restauration par IA présente des anomalies.\nVous êtes archiviste numérique, chargé d’analyser « Le long de la rivière pendant la fête de Qingming ».\nDes erreurs visuelles et historiques ont été introduites par l’IA.\nRésolvez des mini-jeux pour identifier et éliminer chaque anomalie.\nStabilisez l’œuvre avant que les archives ne se dégradent définitivement."    ],
    qingming: {
      id:'qingming',
      title:"« Le long de la rivière pendant la fête de Qingming » ",
      text:"Scan haute définition. Des segments ont été réécrits automatiquement par l'IA. Des incohérences picturales sont détectées."
    }
  };

  const gameState = {
    tasks: {
      puzzle: false,
      metadata: false
    },
    choices: [],
    final: null
  };
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

  const FINAL_CHOICES = [
    {
      id: 'maintain',
      label: 'Maintenir le système',
      action: 'garder',
      description: "Ajuster les paramètres de l'IA et conserver la mémoire reconstruite."
    },
    {
      id: 'clean',
      label: 'Nettoyer les données',
      action: 'nettoyer',
      description: "Supprimer les ajouts générés par l'IA pour restaurer l'archive."
    },
    {
      id: 'close',
      label: 'Fermer les Archives',
      action: 'supprimer',
      description: "Arrêter le système et rendre à l'humanité le droit à l'oubli."
    }
  ];

  const ENDINGS = {
    maintain: {
      title: 'Fin 1 : Mémoire parfaite',
      subtitle: 'La machine continue.',
      text: "Vous ajustez les paramètres de l'IA. Les Archives Miroirs restent ouvertes et promettent une mémoire sans lacune. Mais chaque restauration ajoute une couche d'interprétation. Le passé devient plus lisible, et moins certain."
    },
    clean: {
      title: 'Fin 2 : Archives restaurées',
      subtitle: 'La vérité redevient fragile.',
      text: "Vous nettoyez les données synthétiques. Les fragments inventés disparaissent, laissant des vides, des silences et des zones d'ombre. L'archive retrouve son intégrité, mais aussi son incomplétude."
    },
    close: {
      title: "Fin 3 : Droit à l'oubli",
      subtitle: 'Le miroir se tait.',
      text: "Vous fermez définitivement le système. Les reconstitutions s'effacent avec les anomalies. L'humanité perd une mémoire totale, mais retrouve un espace où le passé peut rester partiel, disputé, vivant."
    }
  };

  function resetGameState(){
    gameState.tasks.puzzle = false;
    gameState.tasks.metadata = false;
    gameState.choices.length = 0;
    gameState.final = null;
  }

  class Boot extends Phaser.Scene{ constructor(){ super('Boot'); }preload(){
    // 加载清明上河图主图（用于缩略图）
    this.load.image('qingming_thumb', 'assets/qingming_thumb.png');
    // 主图，用于 Puzzle 横向拼图
    this.load.image('qingming_main', 'assets/qingming_main.png');
  } create(){ resetGameState(); this.scene.start('Intro'); } }

  class Intro extends Phaser.Scene{
    constructor(){ super('Intro'); }
    create(){
      const w=this.scale.width, h=this.scale.height;
      this.cameras.main.setBackgroundColor('#071018');
      const isMobile = w < 620;
      const titleSize = `${Math.round(isMobile ? clamp(w * 0.072, 22, 30) : 36)}px`;
      const bodySize = `${Math.round(isMobile ? clamp(w * 0.041, 14, 17) : 20)}px`;
      this.add.text(w/2, isMobile ? h * 0.12 : h/3, 'Les Archives Miroirs', {
        fontSize:titleSize,
        color:'#fff',
        align:'center',
        wordWrap:{width:w*0.9}
      }).setOrigin(0.5,0);
      const lines=DIALOGUES.intro;
      let idx=0;
      const txt=this.add.text(w/2,isMobile ? h * 0.24 : h/2,lines[0],{
        fontSize:bodySize,
        color:'#ddd',
        align:'left',
        lineSpacing:isMobile ? 6 : 2,
        wordWrap:{width:isMobile ? w*0.82 : w*0.8}
      }).setOrigin(0.5,isMobile ? 0 : 0.5);
      const buttonY = isMobile ? Math.min(h - 58, txt.y + txt.height + 34) : h * 0.75;
      const next=this.add.text(w/2,buttonY,'Continuer →',{fontSize:isMobile ? '16px' : '18px',backgroundColor:'#222',padding:{x:12,y:8}}).setOrigin(0.5).setInteractive();
      next.on('pointerup',()=>{
        idx++;
        if(idx<lines.length) txt.setText(lines[idx]);
        else this.scene.start('ArchiveRoom');
      });
    }
  }

  class ArchiveRoom extends Phaser.Scene{
    constructor(){ super('ArchiveRoom'); }
    create(){
      const w=this.scale.width, h=this.scale.height;
      const isMobile = w < 620;
      this.cameras.main.setBackgroundColor('#07121a');
      const header = this.add.text(18,18,'Salle des archives : Fragment Qingming', {
        fontSize:isMobile ? '15px' : '18px',
        color:'#ffffff',
        wordWrap:{width:w-36}
      });

      const item = DIALOGUES.qingming;
      const thumbSource = this.textures.get('qingming_thumb').getSourceImage();
      const thumbScale = Math.min((w * 0.92) / thumbSource.width, (h * (isMobile ? 0.22 : 0.34)) / thumbSource.height);
      const thumbW = thumbSource.width * thumbScale;
      const thumbH = thumbSource.height * thumbScale;
      const containerY = isMobile ? Math.max(160, header.y + header.height + 82) : h/2 - 40;
      const container = this.add.container(w/2, containerY);
      // 替换为缩略图显示
      const img = this.add.image(0, 0, 'qingming_thumb').setOrigin(0.5,0.5);
      img.setScale(thumbScale);
      container.add(img);

      const label = this.add.text(0,thumbH / 2 + 16,item.title,{
        fontSize:isMobile ? '13px' : '16px',
        align:'center',
        wordWrap:{width:Math.min(w*0.86, 520)}
      }).setOrigin(0.5,0);
      container.add(label);

      const hitW = Math.max(thumbW, label.width);
      const hitH = thumbH + label.height + 24;
      container.setSize(hitW, hitH);
      container.setInteractive(new Phaser.Geom.Rectangle(-hitW/2,-thumbH/2,hitW,hitH), Phaser.Geom.Rectangle.Contains);
      container.on('pointerup',()=> this.openArchive(item));
      container.on('pointerover',()=> img.setTint(0xaaaaaa));
      container.on('pointerout',()=> img.clearTint());


      this.choiceText = this.add.text(18,header.y + header.height + 16,'Choix final : —',{fontSize:isMobile ? '13px' : '14px'});
      this.updateChoices();
      this.drawProgress(header.y + header.height + 42, isMobile);

      const navX = w / 2;
      const navY = isMobile ? Math.min(h - 122, containerY + thumbH / 2 + label.height + 70) : h - 300;
      const allTasksDone = gameState.tasks.puzzle && gameState.tasks.metadata;

      if (allTasksDone && !gameState.final) {
        this.showFinalDecision(navX, isMobile ? Math.max(h - 260, navY - 90) : navY - 20, isMobile);
      } else {
        const puzzleLabel = gameState.tasks.puzzle ? 'Puzzle restauré ✓' : 'Décryptage : Puzzle 15×1 →';
        this.add.text(navX,navY,puzzleLabel,{fontSize:isMobile ? '14px' : '16px',backgroundColor:'#222',padding:{x:10,y:8}}).setOrigin(0.5).setInteractive().on('pointerup',()=>this.scene.launch('Puzzle'));

        const metadataLabel = gameState.tasks.metadata ? 'Métadonnées corrigées ✓' : 'Métadonnées';
        this.add.text(navX,navY + 52, metadataLabel, {
          fontSize: isMobile ? "20px" : "24px",
          color: gameState.tasks.metadata ? "#35b779" : "#0077ff"
        })
        .setOrigin(0.5)
        .setInteractive()
        .on('pointerdown', () => {
          this.scene.start("MetadataScene");
        });
      }

    }

    drawProgress(y, isMobile){
      const status = [
        `${gameState.tasks.puzzle ? '✓' : '□'} Puzzle restauré`,
        `${gameState.tasks.metadata ? '✓' : '□'} Métadonnées vérifiées`
      ].join('   ');
      this.add.text(18,y,status,{
        fontSize:isMobile ? '12px' : '14px',
        color:'#b9d8ff',
        wordWrap:{width:this.scale.width-36}
      });
    }

    showFinalDecision(x, y, isMobile){
      const w=this.scale.width;
      const title = this.add.text(x,y,"Décision finale",{
        fontSize:isMobile ? '18px' : '22px',
        color:'#ffffff',
        align:'center'
      }).setOrigin(0.5);
      const text = this.add.text(x,y + 30,"Que faut-il faire de l'archive restaurée ?",{
        fontSize:isMobile ? '13px' : '15px',
        color:'#d7e7ef',
        align:'center',
        wordWrap:{width:w*0.86}
      }).setOrigin(0.5,0);

      let buttonY = y + (isMobile ? 82 : 86);
      FINAL_CHOICES.forEach(choice => {
        const btn = this.add.text(x,buttonY,choice.label,{
          fontSize:isMobile ? '13px' : '15px',
          color:'#fff',
          backgroundColor:'#25323c',
          padding:{x:12,y:8},
          align:'center',
          wordWrap:{width:w*0.74}
        }).setOrigin(0.5).setInteractive();
        btn.on('pointerup',()=>this.chooseFinal(choice));
        buttonY += isMobile ? 42 : 46;
      });
    }

    chooseFinal(choice){
      gameState.final = choice.id;
      gameState.choices.push({ id:'qingming_final', action:choice.action, label:choice.label });
      this.scene.start('Ending');
    }

    openArchive(item){
      const w=this.scale.width, h=this.scale.height;
      const isMobile = w < 620;
      const panelW = isMobile ? w * 0.9 : w * 0.8;
      const panelH = isMobile ? Math.min(h * 0.58, 360) : h * 0.6;
      const bg=this.add.rectangle(w/2,h/2, panelW, panelH, 0x000000,0.92);
      const box=this.add.container(0,0,[bg]);
      const title=this.add.text(w/2,h/2-panelH/2+28,item.title,{
        fontSize:isMobile ? '16px' : '22px',
        align:'center',
        wordWrap:{width:panelW-36}
      }).setOrigin(0.5,0);
      const text=this.add.text(w/2-panelW/2+24,h/2-panelH/2+88,item.text,{
        fontSize:isMobile ? '14px' : '16px',
        wordWrap:{width:panelW-48}
      });
      // 三个操作按钮已移除，改为单一关闭按钮以避免影响其他场景逻辑
      const closeBtn = this.add.text(w/2, h/2+panelH/2-38, 'FERMER', { fontSize: '16px', backgroundColor: '#555', padding: {x:12,y:8} }).setInteractive().setOrigin(0.5);
      box.add([title, text, closeBtn]);
      const close = () => { box.destroy(true); };
      closeBtn.on('pointerup', close);
    }

    updateChoices(){
      this.choiceText.setText('Choix : '+gameState.choices.map(c=>c.action).join(', '));
    }
  }

class Puzzle extends Phaser.Scene {
  constructor() {
    super('Puzzle');
  }

  create() {
    const w = this.scale.width;
    const h = this.scale.height;

    this.cameras.main.setBackgroundColor('#06121b');
    this.solved = gameState.tasks.puzzle;
    this.add.text(20, 20, 'Puzzle Qingming (15 × 1)', { fontSize: '18px', color: '#ffffff' });

    const grid = 15;

    // 原图尺寸
    const src = this.textures.get('qingming_main').getSourceImage();
    const imgW = src.width;
    const imgH = src.height;

    const displayH = Math.min(140, Math.max(56, (w * 0.92) * imgH / imgW));
    const scale = displayH / imgH;
    const pieces = Array.from({ length: grid }, (_, i) => {
      const cropX = Math.round((imgW * i) / grid);
      const nextCropX = Math.round((imgW * (i + 1)) / grid);
      const sliceW = nextCropX - cropX;
      return {
        index: i,
        cropX,
        sliceW,
        scaledW: Math.round(sliceW * scale)
      };
    });

    const totalW = pieces.reduce((sum, piece) => sum + piece.scaledW, 0);
    const startX = w / 2 - totalW / 2;
    const y = h < 620 ? h * 0.34 : h / 2;

    // 创建固定槽位
    this.slots = [];
    let slotCursorX = startX;
    for (let i = 0; i < grid; i++) {
      const pieceInfo = pieces[i];
      const x = slotCursorX + pieceInfo.scaledW / 2;
      const slotRect = this.add.rectangle(x, y, pieceInfo.scaledW, displayH)
        .setStrokeStyle(2, 0x333333);
      this.slots.push({ x, y, slotRect, piece: null });
      slotCursorX += pieceInfo.scaledW;
    }

    // 创建碎片池（放置区）
    const poolY = Math.min(h - 90, y + displayH + 110); // 放置区在底部
    const poolXStart = w / 2 - totalW / 2;
    const order = Phaser.Utils.Array.Shuffle(Array.from({ length: grid }, (_, i) => i));

    this.pool = [];
    let poolCursorX = poolXStart;
    for (let i = 0; i < grid; i++) {
      const index = order[i];
      const pieceInfo = pieces[index];
      const textureKey = `qingming_piece_${index}`;

      if (!this.textures.exists(textureKey)) {
        const canvasTexture = this.textures.createCanvas(textureKey, pieceInfo.sliceW, imgH);
        const ctx = canvasTexture.getContext();
        ctx.drawImage(
          src,
          pieceInfo.cropX, 0, pieceInfo.sliceW, imgH,
          0, 0, pieceInfo.sliceW, imgH
        );
        canvasTexture.refresh();
      }

      const piece = this.add.image(poolCursorX + pieceInfo.scaledW / 2, poolY, textureKey)
        .setOrigin(0.5)
        .setScale(scale)
        .setInteractive();

      piece.correctIndex = index;
      piece.snapDistance = Math.max(45, pieceInfo.scaledW * 0.65);
      piece.startX = piece.x;
      piece.startY = piece.y;

      this.input.setDraggable(piece);
      this.pool.push(piece);
      poolCursorX += pieceInfo.scaledW;
    }

    // 拖拽逻辑
    this.input.on('drag', (_, piece, dragX, dragY) => {
      piece.x = dragX;
      piece.y = dragY;
    });

    this.input.on('dragend', (_, piece) => {
      // 找最近的空槽位
      let closest = null;
      let minDist = Infinity;
      this.slots.forEach((slot, slotIndex) => {
        if (slot.piece && slotIndex !== piece.currentSlot) return; // 槽位已占用
        const d = Phaser.Math.Distance.Between(piece.x, piece.y, slot.x, slot.y);
        if (d < minDist) {
          minDist = d;
          closest = slot;
        }
      });

      if (closest && minDist < piece.snapDistance) { // 距离阈值内才放入
        // 如果之前碎片在槽位里，需要先清除
        if (piece.currentSlot !== undefined) {
          this.slots[piece.currentSlot].piece = null;
        }

        piece.x = closest.x;
        piece.y = closest.y;
        closest.piece = piece;
        piece.currentSlot = this.slots.indexOf(closest);
      } else {
        // 回到放置区
        piece.x = piece.startX;
        piece.y = piece.startY;

        if (piece.currentSlot !== undefined) {
          this.slots[piece.currentSlot].piece = null;
          delete piece.currentSlot;
        }
      }

      if (this.isSolved()) this.showSuccess();
    });

    // 提示文字
    this.status = this.add.text(
      w / 2, y + displayH / 2 + 34,
      'Glissez les fragments pour restaurer le rouleau…',
      { fontSize: w < 520 ? '13px' : '16px', color: '#ffffff', wordWrap:{width:w*0.9} }
    ).setOrigin(0.5);

    // 关闭按钮
    this.add.text(w - 80, 20, 'FERMER', {
      fontSize: '14px',
      backgroundColor: '#222',
      padding: 6,
      color: '#fff'
    })
    .setInteractive()
    .on('pointerup', () => this.scene.start('ArchiveRoom'));
  }

  // 判断是否完成
  isSolved() {
    return this.slots.every((slot, i) => slot.piece && slot.piece.correctIndex === i);
  }

  // 成功提示
  showSuccess() {
    if (this.solved) return;
    this.solved = true;
    gameState.tasks.puzzle = true;
    this.status.setText('Puzzle résolu ! Le rouleau est restauré. Fermez pour revenir aux archives.');
  }
}


  class MetadataScene extends Phaser.Scene {
    constructor() {
        super({ key: 'MetadataScene' });
    }

    create() {
        // 背景
        this.cameras.main.setBackgroundColor('#ffffff');


        // 错误元数据
        const lines = [
                { 
        text: "1. Ce rouleau a été peint en l’an 800, durant la dynastie Song du Nord.", 
        wrong: true  // 实创作于12世纪
    },
    { 
        text: "2. L’œuvre utilise une technique de coloration typique de la dynastie Ming.", 
        wrong: true  // 明代设色技法不是张择端版本
    },
    { 
        text: "3. « Le long de la rivière pendant la fête de Qingming » représente la capitale Bianjing (aujourd’hui Kaifeng) en pleine effervescence durant la fête de Qingming.", 
        wrong: false // 这是正确描述
    },
    { 
        text: "4. Ce rouleau fait partie des dix peintures les plus célèbres de l’histoire chinoise.", 
        wrong: false  // 说法流行但不属于官方“十大”
    },
    { 
        text: "5. Le début du rouleau montre les faubourgs, la partie centrale se concentre sur le pont en arc, et la fin décrit les rues animées de la ville.", 
        wrong: false  //  正确描述
    },
    { 
        text: "6. Le rouleau montre plus de cinq types de moyens de transport.", 
        wrong: false  // 正确描述
    },
    { 
        text: "7. Le rouleau représente moins de dix catégories sociales parmi les personnages.", 
        wrong: true  // 实际人物身份种类非常多
    }
];


        this.selected = 0;
        this.totalWrong = lines.filter(l => l.wrong).length;

        const startY = this.scale.height < 620 ? 76 : 120;
        const fontSize = this.scale.width < 520 ? '14px' : '20px';
        const wrapWidth = Math.max(260, this.scale.width - 90);
        let cursorY = startY;

        lines.forEach((line, i) => {
            let textObj = this.add.text(60, cursorY, line.text, {
                fontSize,
                color: '#000',
                wordWrap: { width: wrapWidth }
            }).setInteractive();
            cursorY += textObj.height + (this.scale.width < 520 ? 12 : 18);

            // 点击事件
            textObj.on('pointerdown', () => {
                if (line.wrong) {
                    textObj.setColor('#d60000'); // 红色表示选对了（错误句子）
                    this.selected++;  // 只在选对时计数
                } else {
                    textObj.setColor('#00a000'); // 绿色表示误选
                }

                textObj.disableInteractive();
              ;

                if (this.selected === this.totalWrong) {
                    this.showResult();
                }
            });
        });

        // 返回按钮
        this.add.text(20, 20, "← Retour", {
            fontSize: '24px',
            color: '#0077ff'
        })
        .setInteractive()
        .on('pointerdown', () => {
            this.scene.start("ArchiveRoom");
        });
    }

       showResult() {
        const w = this.scale.width;
        const h = this.scale.height;
        gameState.tasks.metadata = true;
        
        // 背景半透明遮罩
        const bg = this.add.rectangle(w / 2, h / 2, w, h, 0x000000, 0.5);
        
        // 对话框背景
        const dialogW = Math.min(600, w * 0.88);
        const dialogBox = this.add.rectangle(w / 2, h / 2, dialogW, 200, 0xffffff);
        
        // 对话框标题
        const title = this.add.text(w / 2, h / 2 - 60, "Succès !", {
          fontSize: '28px',
          color: '#2e7d32',
          fontStyle: 'bold'
        }).setOrigin(0.5);
        
        // 对话框内容
        const content = this.add.text(w / 2, h / 2, "Vous avez identifié toutes\nles métadonnées erronées.", {
          fontSize: '18px',
          color: '#222',
          align: 'center'
        }).setOrigin(0.5);
        
        // 关闭按钮
        const closeBtn = this.add.text(w / 2, h / 2 + 70, "Fermer", {
          fontSize: '16px',
          color: '#fff',
          backgroundColor: '#2e7d32',
          padding: { x: 20, y: 10 }
        }).setOrigin(0.5).setInteractive();
        
        closeBtn.on('pointerdown', () => this.scene.start("ArchiveRoom"));
      }
}

class Ending extends Phaser.Scene {
  constructor(){
    super('Ending');
  }

  create(){
    const w=this.scale.width, h=this.scale.height;
    const isMobile = w < 620;
    const ending = ENDINGS[gameState.final] || ENDINGS.clean;
    this.cameras.main.setBackgroundColor('#05080d');

    const margin = isMobile ? 28 : 80;
    const wrapWidth = w - margin * 2;
    const titleY = isMobile ? h * 0.12 : h * 0.18;

    this.add.text(w/2,titleY,ending.title,{
      fontSize:isMobile ? '24px' : '36px',
      color:'#ffffff',
      align:'center',
      wordWrap:{width:wrapWidth}
    }).setOrigin(0.5,0);

    this.add.text(w/2,titleY + (isMobile ? 52 : 66),ending.subtitle,{
      fontSize:isMobile ? '16px' : '20px',
      color:'#9fd4ff',
      align:'center',
      wordWrap:{width:wrapWidth}
    }).setOrigin(0.5,0);

    this.add.text(w/2,titleY + (isMobile ? 100 : 126),ending.text,{
      fontSize:isMobile ? '15px' : '18px',
      color:'#d8dde7',
      align:'left',
      lineSpacing:isMobile ? 8 : 6,
      wordWrap:{width:wrapWidth}
    }).setOrigin(0.5,0);

    const choiceLabel = gameState.choices.length ? gameState.choices[gameState.choices.length - 1].label : '—';
    this.add.text(w/2,h - (isMobile ? 170 : 190),`Décision : ${choiceLabel}`,{
      fontSize:isMobile ? '13px' : '15px',
      color:'#b7c4ce',
      align:'center',
      wordWrap:{width:wrapWidth}
    }).setOrigin(0.5);

    const replay = this.add.text(w/2,h - (isMobile ? 112 : 120),'Rejouer',{
      fontSize:isMobile ? '16px' : '18px',
      color:'#fff',
      backgroundColor:'#263440',
      padding:{x:18,y:10}
    }).setOrigin(0.5).setInteractive();
    replay.on('pointerup',()=>{
      resetGameState();
      this.scene.start('Intro');
    });

    const back = this.add.text(w/2,h - (isMobile ? 58 : 64),'Retour aux archives',{
      fontSize:isMobile ? '14px' : '16px',
      color:'#9fd4ff'
    }).setOrigin(0.5).setInteractive();
    back.on('pointerup',()=>this.scene.start('ArchiveRoom'));
  }
}

  const config={
    type:Phaser.AUTO,
    parent:'game-container',
    backgroundColor:'#0b0b0e',
    scale:{
      mode:Phaser.Scale.RESIZE,
      autoCenter:Phaser.Scale.CENTER_BOTH,
      width:'100%',
      height:'100%'
    },
    input:{
      activePointers:3
    },
    scene:[Boot,Intro,ArchiveRoom,Puzzle,MetadataScene,Ending]
  };
  new Phaser.Game(config);
  
  </script>
</body>
</html>
